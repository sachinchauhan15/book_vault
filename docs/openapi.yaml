openapi: 3.0.3
info:
  title: Books Management API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8000/api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /auth/register:
    post:
      security: []
      summary: Register a user
      responses:
        "201":
          description: User registered
        "422":
          description: Validation failed
  /auth/login:
    post:
      security: []
      summary: Login and get JWT
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials
  /auth/profile:
    get:
      summary: Get authenticated profile
      responses:
        "200":
          description: Profile fetched
        "401":
          description: Unauthenticated
  /books:
    get:
      summary: List books
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Books fetched
    post:
      summary: Create book
      responses:
        "201":
          description: Book created
        "422":
          description: Validation failed
  /books/{id}:
    get:
      summary: Fetch one book
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book fetched
        "404":
          description: Not found
    put:
      summary: Update book
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book updated
    delete:
      summary: Soft delete book
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book deleted
